name: Bug 报告
description: 提交 Bug 以帮助我们提高应用体验
title: "[Bug] 我的标题"
assignees: Richasy
labels:
  - "bug 🐛"
body:
- type: markdown
attributes: 
    value: |
     ## 写在开头
      🚨 请务必完整填写下面的内容，如果缺少必要的信息，开发者可能会在未调查的情况下直接关闭问题 🚨
- type: textarea
  id: description
  validations:
  required: true
  attributes:
  label: Bug 描述
  description: 请简短的描述你遇到的问题
- type: textarea
  id: repro-steps
  validations:
  required: true
  attributes:
  label: 复现问题的步骤
  render: plain text
  description: 请提供复现问题的步骤，如果不能，请写明原因
  placeholder: |
       干净清晰的复现步骤有助于开发者更快定位问题所在，你所遇到的问题也会获得更高的优先级。
